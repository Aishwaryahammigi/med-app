<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Medicine Finder</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

  <div class="header">
    &#128138; Smart Medicine Finder
  </div>

  <div class="container">

    <input id="searchInput" placeholder="Search medicine..." />

    <div class="filters">
      <button onclick="filterDistance(2)">2 km</button>
      <button onclick="filterDistance(5)">5 km</button>
      <button onclick="filterDistance(10)">10 km</button>
    </div>

    <button class="search-btn" onclick="searchMedicine()">Search</button>

    <div id="loader" class="loader hidden"></div>

    <div id="results"></div>

    <div id="map"></div>

  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>

</body>
</html>
