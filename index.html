<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Medicine Finder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header>
      <h1>💊 Smart Medicine Finder</h1>
      <p>Find medicines near you instantly</p>
    </header>

    <!-- Search Card -->
    <div class="search-card">
      <input type="text" id="searchInput" placeholder="Search medicine...">
      <button onclick="searchMedicine()">Search</button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button onclick="filterDistance(2)">2 km</button>
      <button onclick="filterDistance(5)">5 km</button>
      <button onclick="filterDistance(10)">10 km</button>
    </div>

    <!-- Loader -->
    <div id="loader" class="loader hidden">Searching...</div>

    <!-- Results -->
    <div id="results" class="results">
      <p class="empty">🔍 Start searching for medicines</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
